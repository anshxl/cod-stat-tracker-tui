<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Op Kill Tracker</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: #14161a; color: #e8eaed;
    font: 16px/1.4 system-ui, sans-serif;
    display: flex; flex-direction: column; align-items: center; gap: 18px; padding: 24px;
  }
  h1 { font-size: 18px; font-weight: 600; margin: 0; color: #9aa0a6; letter-spacing: .5px; }
  .meta, .clock { display: flex; gap: 14px; align-items: flex-end; flex-wrap: wrap; justify-content: center; }
  label { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: #9aa0a6; }
  input, select {
    padding: 8px 10px; font-size: 15px; background: #1e2128; border: 1px solid #333842;
    border-radius: 8px; color: #e8eaed;
  }
  .clock input { width: 100px; text-align: center; }
  #opponent { width: 90px; text-transform: uppercase; }
  #map { width: 150px; } #week { width: 60px; }
  .dur { font-size: 13px; color: #9aa0a6; min-width: 110px; text-align: center; }
  .dur b { color: #e8eaed; }
  .players {
    display: grid; grid-template-columns: repeat(5, minmax(120px, 1fr));
    gap: 12px; width: 100%; max-width: 900px;
  }
  .player {
    background: #1e2128; border: 1px solid #333842; border-radius: 12px;
    padding: 16px 8px; text-align: center; cursor: pointer; user-select: none;
    transition: background .08s, transform .04s;
  }
  .player:hover { background: #262a33; }
  .player:active { transform: scale(.97); }
  .player .key { font-size: 11px; color: #6b7280; }
  .player .name { font-size: 15px; font-weight: 600; margin: 2px 0 8px; }
  .player .kills { font-size: 40px; font-weight: 700; line-height: 1; }
  .player .kpm { font-size: 13px; color: #7cb342; margin-top: 6px; }
  .player.flash { background: #2f6b34; }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button {
    padding: 8px 16px; font-size: 14px; background: #262a33; color: #e8eaed;
    border: 1px solid #333842; border-radius: 8px; cursor: pointer;
  }
  button:hover { background: #30353f; }
  button.primary { background: #2f6b34; border-color: #3c8043; }
  button.primary:hover { background: #367a3d; }
  .hint { font-size: 12px; color: #6b7280; text-align: center; }
  .saved { width: 100%; max-width: 700px; }
  .saved h2 { font-size: 13px; color: #9aa0a6; font-weight: 600; margin: 0 0 8px; }
  .saved .row {
    display: flex; justify-content: space-between; align-items: center; gap: 8px;
    padding: 6px 10px; border: 1px solid #262a33; border-radius: 8px; margin-bottom: 6px; font-size: 13px;
  }
  .saved .row span.meta-txt { color: #c7cad1; }
  .saved .row .del { background: none; border: none; color: #7f5a5a; padding: 2px 6px; }
  .saved .row .del:hover { color: #e06b6b; }
  .saved .foot { display: flex; gap: 10px; margin-top: 8px; }
  @media (max-width: 640px) { .players { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>
  <h1>OP KILL TRACKER</h1>

  <div class="meta">
    <label>Date<input type="date" id="date"></label>
    <label>Week<input type="number" id="week" min="1" placeholder="#"></label>
    <label>Opponent<input id="opponent" placeholder="ABBR"></label>
    <label>Map<input id="map" placeholder="Summit"></label>
  </div>

  <div class="clock">
    <label>Match start<input id="start" placeholder="mm:ss"></label>
    <label>Match end<input id="end" placeholder="mm:ss"></label>
    <div class="dur" id="dur">duration —</div>
  </div>

  <div class="players" id="players"></div>

  <div class="actions">
    <button id="undo">Undo (⌫)</button>
    <button id="save" class="primary">Save match</button>
    <button id="reset">Reset match</button>
  </div>
  <div class="hint">Press 1–5 or click a player to add a kill. Backspace undoes the last kill.</div>

  <div class="saved">
    <h2>Saved matches (<span id="count">0</span>)</h2>
    <div id="savedList"></div>
    <div class="foot">
      <button id="linkCsv" class="primary">Link / sync CSV</button>
      <button id="download">Download ops_kills.csv</button>
      <button id="clearAll">Clear all saved</button>
    </div>
    <div class="hint" id="syncStatus" style="text-align:left;margin-top:6px"></div>
  </div>

<script>
const PLAYERS = ["Prevail", "Viper", "Abhiz", "Warden", "Skullguy"];
const KEY = "op-kill-tracker";

function today() {
  const d = new Date(), p = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())}`;
}
const blankMatch = () => ({ date: today(), week: "", opponent: "", map: "",
  start: "", end: "", kills: PLAYERS.map(() => 0), history: [] });

let store = load();

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(KEY));
    if (s && s.current && Array.isArray(s.matches)) return s;
    if (s && Array.isArray(s.kills)) return { current: { ...blankMatch(), ...s }, matches: [] }; // migrate old
  } catch {}
  return { current: blankMatch(), matches: [] };
}
function persist() { localStorage.setItem(KEY, JSON.stringify(store)); }

// "mm:ss" / "h:mm:ss" / bare seconds -> seconds; null if unparseable.
function toSeconds(str) {
  if (!str || !str.trim()) return null;
  const parts = str.trim().split(":").map(Number);
  if (parts.some(isNaN)) return null;
  return parts.reduce((acc, n) => acc * 60 + n, 0);
}
function footageMin(m) {
  const a = toSeconds(m.start), b = toSeconds(m.end);
  if (a != null && b != null && b > a) return (b - a) / 60;      // live from timestamps
  return typeof m.footageMin === "number" ? m.footageMin : null; // stored (e.g. CSV import)
}

// --- build player cards ---
const playersEl = document.getElementById("players");
PLAYERS.forEach((name, i) => {
  const el = document.createElement("div");
  el.className = "player";
  el.innerHTML = `<div class="key">${i + 1}</div><div class="name">${name}</div>
    <div class="kills">0</div><div class="kpm">—</div>`;
  el.addEventListener("click", () => addKill(i));
  playersEl.appendChild(el);
});
const cards = [...playersEl.children];
const $ = id => document.getElementById(id);

function render() {
  const cur = store.current, dm = footageMin(cur);
  $("dur").innerHTML = dm == null ? "duration —" : `duration <b>${dm.toFixed(1)} min</b>`;
  cards.forEach((el, i) => {
    el.querySelector(".kills").textContent = cur.kills[i];
    el.querySelector(".kpm").textContent = dm == null ? "—" : (cur.kills[i] / dm).toFixed(2) + " /min";
  });
  ["date", "week", "opponent", "map", "start", "end"].forEach(f => { $(f).value = cur[f]; });

  $("count").textContent = store.matches.length;
  $("savedList").innerHTML = "";
  store.matches.forEach((m, idx) => {
    const total = m.kills.reduce((a, b) => a + b, 0);
    const fmv = footageMin(m);
    const fm = fmv != null ? `, ${fmv.toFixed(1)}m` : ", no timestamps";
    const row = document.createElement("div");
    row.className = "row"; row.title = "Click to edit"; row.style.cursor = "pointer";
    row.innerHTML = `<span class="meta-txt">${m.date} vs ${m.opponent || "?"} — ${m.map || "?"} — ${total} kills${fm}</span>`;
    row.addEventListener("click", () => editMatch(idx));
    const del = document.createElement("button");
    del.className = "del"; del.textContent = "×"; del.title = "Delete";
    del.addEventListener("click", e => { e.stopPropagation(); store.matches.splice(idx, 1); persist(); render(); syncFile(); });
    row.appendChild(del);
    $("savedList").appendChild(row);
  });
}

function editMatch(idx) {
  const m = store.matches[idx];
  if (store.current.kills.some(k => k > 0) &&
      !confirm("Reopen this match for editing? The current unsaved tally will be replaced.")) return;
  store.current = { date: m.date, week: m.week, opponent: m.opponent, map: m.map,
    start: m.start || "", end: m.end || "", footageMin: m.footageMin ?? null,
    kills: m.kills.slice(), history: [] };
  store.matches.splice(idx, 1);
  persist(); render(); syncFile();
  window.scrollTo(0, 0);
}

function addKill(i) {
  const cur = store.current;
  cur.kills[i]++; cur.history.push(i);
  persist();
  cards[i].classList.add("flash");
  setTimeout(() => cards[i].classList.remove("flash"), 120);
  render();
}
function undo() {
  const i = store.current.history.pop();
  if (i == null) return;
  store.current.kills[i] = Math.max(0, store.current.kills[i] - 1);
  persist(); render();
}
function saveMatch() {
  const cur = store.current;
  if (!cur.opponent.trim() || !cur.map.trim()) { alert("Set opponent and map before saving."); return; }
  if (footageMin(cur) == null) { alert("Set valid match start and end timestamps (end after start) before saving."); return; }
  if (cur.kills.every(k => k === 0)) { alert("No kills recorded — nothing to save."); return; }
  store.matches.push({
    date: cur.date, week: cur.week, opponent: cur.opponent.trim().toUpperCase(),
    map: cur.map.trim(), start: cur.start, end: cur.end,
    footageMin: footageMin(cur), kills: cur.kills.slice(),
  });
  // Keep date/week/opponent for the next map of the same series; clear the rest.
  store.current = { ...blankMatch(), date: cur.date, week: cur.week, opponent: cur.opponent };
  persist(); render(); syncFile();
}
function reset() {
  if (!confirm("Clear the current match (kills + timestamps)?")) return;
  const cur = store.current;
  store.current = { ...blankMatch(), date: cur.date, week: cur.week, opponent: cur.opponent };
  persist(); render();
}

// --- CSV: mirrors tournament_players.csv key columns; full history each write ---
const csvCell = v => /[",\n]/.test(v) ? `"${String(v).replace(/"/g, '""')}"` : String(v);
function buildCsv() {
  const header = ["Date", "Week", "Opponent", "Map", "Player", "OpKills", "FootageMin", "OpKillsPerMin"];
  const rows = [header];
  store.matches.forEach(m => {
    const fm = footageMin(m);
    PLAYERS.forEach((name, i) => {
      rows.push([
        m.date, m.week, m.opponent, m.map, name, m.kills[i],
        fm != null ? fm.toFixed(2) : "",
        fm != null ? (m.kills[i] / fm).toFixed(3) : "",
      ]);
    });
  });
  return rows.map(r => r.map(csvCell).join(",")).join("\n") + "\n";
}
function downloadCsv() {
  if (!store.matches.length) { alert("No saved matches to export."); return; }
  const url = URL.createObjectURL(new Blob([buildCsv()], { type: "text/csv" }));
  const a = document.createElement("a");
  a.href = url; a.download = "ops_kills.csv"; a.click();
  URL.revokeObjectURL(url);
}

// Parse CSV text into rows, honoring "" quoting.
function parseCsv(text) {
  const rows = []; let row = [], cell = "", q = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (q) {
      if (c === '"') { if (text[i + 1] === '"') { cell += '"'; i++; } else q = false; }
      else cell += c;
    } else if (c === '"') q = true;
    else if (c === ",") { row.push(cell); cell = ""; }
    else if (c === "\n") { row.push(cell); rows.push(row); row = []; cell = ""; }
    else if (c !== "\r") cell += c;
  }
  if (cell !== "" || row.length) { row.push(cell); rows.push(row); }
  return rows;
}
// Reconstruct match objects from an ops_kills.csv (5 player rows -> 1 match).
function matchesFromCsv(text) {
  const rows = parseCsv(text).filter(r => r.length > 1);
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim());
  const col = n => head.indexOf(n);
  const ci = { date: col("Date"), week: col("Week"), opp: col("Opponent"),
    map: col("Map"), player: col("Player"), kills: col("OpKills"), fm: col("FootageMin") };
  if ([ci.date, ci.opp, ci.map, ci.player, ci.kills].some(x => x < 0)) return []; // not our format
  const byKey = new Map();
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const date = (row[ci.date] || "").trim();
    const opp = (row[ci.opp] || "").trim().toUpperCase();
    const map = (row[ci.map] || "").trim();
    const player = (row[ci.player] || "").trim();
    if (!date || !player) continue;
    const key = `${date}|${opp}|${map}`;
    if (!byKey.has(key)) byKey.set(key, {
      date, week: ci.week >= 0 ? (row[ci.week] || "").trim() : "",
      opponent: opp, map, start: "", end: "",
      footageMin: ci.fm >= 0 && (row[ci.fm] || "").trim() ? Number(row[ci.fm]) : null,
      kills: PLAYERS.map(() => 0),
    });
    const pi = PLAYERS.indexOf(player);
    if (pi >= 0) byKey.get(key).kills[pi] = Number(row[ci.kills]) || 0;
  }
  return [...byKey.values()];
}
const matchKey = m => `${m.date}|${m.opponent}|${m.map}`;
// Union keyed by (date, opponent, map); existing (browser) wins on collision.
function mergeMatches(existing, incoming) {
  const have = new Set(existing.map(matchKey));
  return existing.concat(incoming.filter(m => !have.has(matchKey(m))));
}

// --- linked-file sync (File System Access API) ---
// Handle persists in IndexedDB; readwrite permission must be re-granted (one
// click) each session because browsers require a user gesture to restore it.
const FS_OK = "showSaveFilePicker" in window;
let fileHandle = null;

function idb(method, val) {
  return new Promise((res, rej) => {
    const open = indexedDB.open("op-kill-tracker", 1);
    open.onupgradeneeded = () => open.result.createObjectStore("kv");
    open.onerror = () => rej(open.error);
    open.onsuccess = () => {
      const tx = open.result.transaction("kv", method === "get" ? "readonly" : "readwrite");
      const req = method === "get" ? tx.objectStore("kv").get("csv") : tx.objectStore("kv").put(val, "csv");
      req.onsuccess = () => res(req.result);
      req.onerror = () => rej(req.error);
    };
  });
}
async function ensurePermission() {
  if (!fileHandle) return false;
  if (await fileHandle.queryPermission({ mode: "readwrite" }) === "granted") return true;
  return await fileHandle.requestPermission({ mode: "readwrite" }) === "granted";
}
async function writeFile() {
  const w = await fileHandle.createWritable();
  await w.write(buildCsv());
  await w.close();
}
// Pull in rows the file has that the browser doesn't (e.g. hand-pasted history).
// Only called on explicit reconnect, so browser deletes aren't resurrected.
async function readAndMerge() {
  try {
    const external = matchesFromCsv(await (await fileHandle.getFile()).text());
    const before = store.matches.length;
    store.matches = mergeMatches(store.matches, external);
    persist(); render();
    return store.matches.length - before;
  } catch { return 0; }
}
// Silent auto-sync: only writes if a file is linked AND permission already granted.
async function syncFile() {
  try {
    if (!fileHandle || await fileHandle.queryPermission({ mode: "readwrite" }) !== "granted") return;
    await writeFile();
    setStatus(`synced ✓ (${store.matches.length} matches)`);
  } catch (e) { setStatus("sync failed: " + e.message); }
}
// Button: link a file if none, else grant permission + write.
async function linkOrSync() {
  try {
    if (!fileHandle) {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: "ops_kills.csv",
        types: [{ description: "CSV", accept: { "text/csv": [".csv"] } }],
      });
      await idb("put", fileHandle);
    }
    if (!await ensurePermission()) { setStatus("permission denied"); return; }
    const imported = await readAndMerge();
    await writeFile();
    setStatus(`synced ✓ (${store.matches.length} matches${imported ? `, +${imported} from file` : ""})`);
  } catch (e) { if (e.name !== "AbortError") setStatus("error: " + e.message); }
}
function setStatus(msg) {
  const linked = fileHandle ? `linked: ${fileHandle.name}` : "not linked";
  $("syncStatus").textContent = msg ? `${linked} — ${msg}` : linked;
}
async function initSync() {
  if (!FS_OK) { $("linkCsv").disabled = true; $("linkCsv").title = "Needs Chrome/Edge"; setStatus("file linking needs Chrome/Edge — use Download"); return; }
  $("linkCsv").addEventListener("click", () => linkOrSync().then(render));
  try { fileHandle = await idb("get") || null; } catch {}
  setStatus(fileHandle ? "click to reconnect + sync" : "");
}

// --- wire up ---
["date", "week", "opponent", "map", "start", "end"].forEach(f =>
  $(f).addEventListener("input", e => { store.current[f] = e.target.value; persist(); render(); }));
$("undo").addEventListener("click", undo);
$("save").addEventListener("click", saveMatch);
$("reset").addEventListener("click", reset);
$("download").addEventListener("click", downloadCsv);
$("clearAll").addEventListener("click", () => {
  if (store.matches.length && confirm(`Delete all ${store.matches.length} saved matches?`)) {
    store.matches = []; persist(); render(); syncFile();
  }
});
initSync();
document.addEventListener("keydown", e => {
  if (e.target.tagName === "INPUT" || e.target.tagName === "SELECT") return;
  if (e.key >= "1" && e.key <= "5") addKill(+e.key - 1);
  else if (e.key === "Backspace") { e.preventDefault(); undo(); }
});

render();
</script>
</body>
</html>
